<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Meu Amor, Iza</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a0e17;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #ff4d6d;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .heart {
            font-size: 50px;
            color: #ff4d6d;
            animation: pulse 1.5s infinite;
        }

        .music-control {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        .music-control:hover {
            background-color: #ff758f;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>Para a Iza</h1>
        <p>
            Iza, este espaço foi criado apenas para lembrar o quanto você é especial. 
            O meu amor por você não tem tamanho, e cada detalhe seu torna o mundo muito melhor. 
            Você é a minha pessoa favorita!
        </p>
        
        <button class="music-control" id="playBtn" onclick="togglePlay()">Tocar Caso Indefinido 🎵</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="caso-indefinido.mp3" type="audio/mpeg">
        Seu navegador não suporta o elemento de áudio.
    </audio>

    <script>
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('playBtn');

        function togglePlay() {
            if (music.paused) {
                music.play().then(() => {
                    btn.innerText = "Pausar Música ⏸️";
                }).catch(error => {
                    console.log("Erro ao tocar a música:", error);
                });
            } else {
                music.pause();
                btn.innerText = "Tocar Caso Indefinido 🎵";
            }
        }

        // Tenta tocar automaticamente se o usuário interagir com qualquer parte da tela
        window.addEventListener('click', () => {
            if (music.paused) {
                togglePlay();
            }
        }, { once: true });
    </script>

</body>
</html>
